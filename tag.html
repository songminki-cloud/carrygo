<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>CarryGo Tag Assign</title>
<link rel="stylesheet" href="css/tokens.css">
<style>
*{box-sizing:border-box}body{margin:0;background:var(--cg-warm-paper,#f7f3ec);color:#111;font-family:Inter,'Noto Sans KR',system-ui,sans-serif}.page{max-width:430px;margin:0 auto;padding:16px}.card{background:#fff;border:2px solid #111;border-radius:18px;padding:18px;margin:14px 0}h1{font-size:36px;line-height:.9;margin:0 0 10px;font-weight:950;letter-spacing:-.05em}.rid{font-size:20px;font-weight:950;word-break:break-all}p{font-size:13px;line-height:1.45;color:#555;font-weight:750}.label{display:block;margin:14px 0 6px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:950;color:#736f68}input{width:100%;min-height:56px;border:1.4px solid #d8d1c7;border-radius:13px;padding:14px;font-size:18px;font-weight:850;background:#fff;color:#111}.btn{width:100%;border:0;border-radius:999px;background:#050505;color:#fff;padding:16px 12px;font-size:16px;font-weight:950;margin-top:14px}.btn:disabled{opacity:.45}.result{display:none;border:2px solid #10b981;background:#ecfff7;border-radius:16px;padding:16px;margin-top:14px}.tags{font-size:42px;font-weight:950;letter-spacing:-.04em;line-height:1.05}.err{color:#8f3c32!important}.small{font-size:12px;color:#736f68;font-weight:800}.check{display:flex;gap:8px;align-items:flex-start;margin-top:14px}.check input{width:auto;min-height:0;margin-top:2px}</style>
</head>
<body>
<main class="page">
  <section class="card">
    <h1>ASSIGN<br>TAGS</h1>
    <p>온라인 예약 고객 현장 접수용. 하드카피 동의서, 짐 수량, 결제 상태 확인 후 스태프가 태그번호를 생성합니다.</p>
    <div class="label">Reservation ID</div><div class="rid" id="rid">-</div>
    <form id="tagForm">
      <label class="label">Staff Code</label><input type="text" name="staff_code" required inputmode="numeric" placeholder="스태프 코드">
      <label class="small check"><input type="checkbox" name="hardcopy" required><span>하드카피 동의서 작성/서명 및 실제 짐 수량 확인 완료</span></label>
      <button class="btn" type="submit">러기지택 번호 생성</button>
      <div class="result" id="result"></div>
      <p class="small" id="msg">생성된 번호를 실제 러기지택에 크게 기재하고 짐에 부착하세요.</p>
    </form>
  </section>
</main>
<script>
const API='https://script.google.com/macros/s/AKfycbyWazV2Bwyex0hyUG17615cCd4zFLnBOPABVv9wQ4AoVltXFrZ8Qh5ncPQtEW-c9ZFs/exec';
const params=new URLSearchParams(location.search);const id=params.get('id')||'';rid.textContent=id||'Missing reservation id';
tagForm.addEventListener('submit',async e=>{e.preventDefault();const btn=e.submitter,msg=document.getElementById('msg'),result=document.getElementById('result');const data=Object.fromEntries(new FormData(tagForm).entries());btn.disabled=true;msg.textContent='생성 중...';msg.classList.remove('err');result.style.display='none';try{const q=new URLSearchParams({mode:'assign_luggage_tags_api',reservation_id:id,staff_code:data.staff_code});const r=await fetch(API+'?'+q,{cache:'no-store'});const o=await r.json();if(!o.ok)throw new Error(o.error||'failed');result.innerHTML=`<b>${o.already_assigned?'이미 배정됨':'배정 완료'}</b><div class="tags">${o.luggage_tag_numbers}</div><p>이 번호를 실제 러기지택에 기재하세요.</p>`;result.style.display='block';msg.textContent='태그 부착 후 사진 촬영까지 완료하세요.'}catch(err){msg.textContent=err.message||String(err);msg.classList.add('err')}finally{btn.disabled=false}});
</script>
</body>
</html>
