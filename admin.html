<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CarryGo Admin</title>
<link rel="stylesheet" href="css/tokens.css">
<style>
*{box-sizing:border-box}body{margin:0;background:var(--cg-warm-paper);color:var(--cg-ink);font-family:var(--font-sans);-webkit-font-smoothing:antialiased}.page{max-width:560px;margin:0 auto;padding:16px}.card{background:#fff;border:2px solid #111;border-radius:18px;padding:18px;margin-bottom:14px}h1{font-size:34px;line-height:.95;margin:0 0 10px;font-weight:900;letter-spacing:-.04em}p{font-size:14px;color:#555;line-height:1.45;margin:0 0 14px}.logo{width:176px;height:auto;margin-bottom:12px}.label{display:block;font-size:11px;font-weight:900;letter-spacing:.16em;text-transform:uppercase;color:#736f68;margin:12px 0 6px}input[type=password]{width:100%;border:1.4px solid #d8d1c7;border-radius:12px;padding:14px;font-size:18px;font-weight:800}button{width:100%;border:0;border-radius:999px;background:#050505;color:#fff;padding:15px 12px;font-size:15px;font-weight:900;margin-top:12px}button.secondary{background:#fff;color:#111;border:1.6px solid #111}button:disabled{opacity:.42}.row{border:1.4px solid #d8d1c7;border-radius:14px;padding:14px;margin-top:10px;background:#fff;display:grid;grid-template-columns:34px 1fr;gap:10px;align-items:start}.row input{width:24px;height:24px;margin-top:4px}.rid{font-size:23px;font-weight:900;letter-spacing:-.03em}.meta{font-size:13px;color:#555;line-height:1.45;margin-top:5px}.msg{font-size:13px;font-weight:800;margin-top:10px;color:#736f68;white-space:pre-wrap}.err{background:#fff3f0;border:1px solid #f1b8ac;border-radius:12px;color:#8f3c32;padding:12px}.ok{background:#ecfff7;border:1px solid #10b981;border-radius:12px;color:#065f46;padding:12px}.toolbar{position:sticky;bottom:0;background:var(--cg-warm-paper);padding:10px 0 4px;margin-top:10px}.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}.tab{border:1.3px solid #111;background:#fff;color:#111;padding:10px 6px;font-size:11px;margin:0}.tab.active{background:#111;color:#fff}.mini-form{display:grid;gap:10px;margin-top:12px}.mini-form input,.mini-form textarea{width:100%;border:1.3px solid #d8d1c7;border-radius:10px;padding:11px;font-size:14px;font-weight:800}.date-range{display:grid;grid-template-columns:1fr 1fr;gap:8px}.mini-form textarea{min-height:116px;resize:vertical}.tool-title{font-size:24px!important;margin-top:0}.small-btn{border-radius:999px;padding:9px 10px;font-size:11px;margin-top:8px}.danger{border-color:#8f3c32!important;color:#8f3c32!important}.hidden{display:none}.count{display:inline-block;background:#111;color:#fff;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:900;margin-left:6px}
</style>
</head>
<body>
<main class="page">
  <section class="card">
    <img class="logo" src="assets/logo/carrygo_logo_final.png" alt="CarryGo Seoul">
    <h1>CarryGo<br>Admin</h1>
    <p>결제확인, 수령완료, 취소, 환불, 콘서트/공연일 생성을 처리합니다.</p>
    <label class="label" for="pin">Admin PIN</label>
    <input id="pin" type="password" placeholder="PIN" autocomplete="current-password">
    <div class="tabs">
      <button class="tab active" type="button" data-tab="payment">Payment</button>
      <button class="tab" type="button" data-tab="return">Return</button>
      <button class="tab" type="button" data-tab="cancel">Cancel</button>
      <button class="tab" type="button" data-tab="refund">Refund</button>
      <button class="tab" type="button" data-tab="concert">Concert</button>
    </div>
    <button id="loadBtn" type="button">Load List</button>
    <button id="selectAllBtn" class="secondary hidden" type="button">Select All / 전체선택</button>
    <div id="msg" class="msg"></div>
  </section>
  <section id="concertTools" class="card hidden">
    <h1 class="tool-title">Create<br>Concert</h1>
    <p>콘서트명, 기간, 날짜별 시간, 장소만 입력하면 ID와 날짜 ID는 자동 생성됩니다.</p>
    <div class="mini-form">
      <input id="concertTitle" type="text" placeholder="콘서트명 / Concert title e.g. SHINee WORLD VII">
      <div class="date-range">
        <input id="startDate" type="date" aria-label="Start date">
        <input id="endDate" type="date" aria-label="End date">
      </div>
      <textarea id="timeLines" placeholder="각 날짜별 공연시간을 한 줄씩 입력&#10;예:&#10;19:00&#10;18:00&#10;17:00"></textarea>
      <input id="venue" type="text" placeholder="장소 / Venue e.g. KSPO DOME">
      <input id="concertCode" type="text" placeholder="예약번호 코드 optional e.g. SN · 비우면 자동생성">
      <input id="pickupLink" type="url" placeholder="pickup_drop_guide_link optional">
      <input id="nextDayLink" type="url" placeholder="next_day_pickup_guide_link optional">
      <input id="changeLink" type="url" placeholder="location_change_guide_link optional">
      <button type="button" id="createBundleBtn">Create Concert + Dates</button>
      <button type="button" class="secondary" id="loadConcertsBtn">Load Concerts / 관리 열기</button><button type="button" class="secondary hidden" id="closeConcertsBtn">Close Concerts / 관리 닫기</button>
    </div>
    <div id="concertList"></div>
  </section>
  <section id="list"></section>
  <section class="toolbar hidden" id="toolbar">
    <button id="confirmBtn" type="button" disabled>Action Selected <span id="selectedCount" class="count">0</span></button>
  </section>
</main>
<script>
const API='https://script.google.com/macros/s/AKfycbyWazV2Bwyex0hyUG17615cCd4zFLnBOPABVv9wQ4AoVltXFrZ8Qh5ncPQtEW-c9ZFs/exec';
let currentTab='payment';
const pinEl=document.getElementById('pin'), msgEl=document.getElementById('msg'), listEl=document.getElementById('list'), toolbar=document.getElementById('toolbar'), confirmBtn=document.getElementById('confirmBtn'), selectedCount=document.getElementById('selectedCount'), selectAllBtn=document.getElementById('selectAllBtn'), loadBtn=document.getElementById('loadBtn'), concertTools=document.getElementById('concertTools');
function setMsg(text,type='msg'){msgEl.className=type;msgEl.textContent=text||''}function setBusy(b){[loadBtn,selectAllBtn,confirmBtn,document.getElementById('createBundleBtn'),document.getElementById('loadConcertsBtn'),document.getElementById('closeConcertsBtn')].filter(Boolean).forEach(x=>x.disabled=b)}function pin(){return pinEl.value.trim()}function esc(v){return String(v||'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
async function fetchJson(url){const res=await fetch(url,{cache:'no-store'});const text=await res.text();try{return JSON.parse(text)}catch(e){throw new Error(text.slice(0,500))}}
function statusForTab(){return {payment:'UNPAID',return:'PICKED_UP',cancel:'UNPAID',refund:'CANCELLED'}[currentTab]||'UNPAID'}
function actionLabel(){return {payment:'Confirm Payment / 입금확인',return:'Mark Returned / 수령완료',cancel:'Cancel Selected / 취소처리',refund:'Save Refund / 환불기록'}[currentTab]||'Action'}
function modeForTab(){return {payment:'admin_confirm_payment',return:'admin_update_status',cancel:'admin_update_status',refund:'admin_refund'}[currentTab]}
function setTab(tab){currentTab=tab;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));listEl.innerHTML='';toolbar.classList.add('hidden');selectAllBtn.classList.add('hidden');concertTools.classList.toggle('hidden',tab!=='concert');loadBtn.classList.toggle('hidden',tab==='concert');confirmBtn.textContent=actionLabel()+' ';confirmBtn.appendChild(selectedCount);setMsg(tab==='concert'?'콘서트/공연일 생성 도구입니다.':'Load List를 눌러 목록을 불러오세요.');updateSelection()}
async function loadUnpaid(){const status=statusForTab();setMsg('Loading '+status+'...');setBusy(true);listEl.innerHTML='';toolbar.classList.add('hidden');selectAllBtn.classList.add('hidden');try{const url=currentTab==='payment'?API+'?mode=admin_list_unpaid&admin_pin='+encodeURIComponent(pin()):API+'?mode=admin_list&status='+encodeURIComponent(status)+'&admin_pin='+encodeURIComponent(pin());const data=await fetchJson(url);if(!data.ok)throw new Error(data.error||'Failed');renderRows(data.reservations||[]);setMsg(data.reservations&&data.reservations.length?`${data.reservations.length} ${status} reservation(s).`:`No ${status} reservations.`,'ok')}catch(e){setMsg(e.message||String(e),'err')}finally{setBusy(false);updateSelection()}}
function renderRows(rows){if(!rows.length){listEl.innerHTML='<div class="card ok">No reservations.</div>';return}listEl.innerHTML=rows.map(r=>`<label class="row"><input type="checkbox" class="pick" value="${esc(r.reservation_id)}"><div><div class="rid">${esc(r.reservation_id)}</div><div class="meta">${esc(r.customer_name)} · ${esc(r.customer_email)}<br>${esc(r.concert_date)} ${esc(r.concert_time)} · ${esc(r.payment_method||'')} · ${esc(r.amount_display||'')}<br>Status: ${esc(r.status||statusForTab())} ${r.picked_up_by?'· Staff: '+esc(r.picked_up_by):''}</div></div></label>`).join('');toolbar.classList.remove('hidden');selectAllBtn.classList.remove('hidden');document.querySelectorAll('.pick').forEach(cb=>cb.addEventListener('change',updateSelection))}
function selectedIds(){return Array.from(document.querySelectorAll('.pick:checked')).map(cb=>cb.value)}function updateSelection(){const n=selectedIds().length;selectedCount.textContent=n;confirmBtn.disabled=n===0}function selectAll(){document.querySelectorAll('.pick').forEach(cb=>cb.checked=true);updateSelection()}
async function confirmSelected(){const ids=selectedIds();if(!ids.length)return;if(!confirm(ids.join(', ')+' 처리할까요?'))return;setBusy(true);setMsg('Processing...\n'+ids.join('\n'));try{let url=API+'?mode='+modeForTab()+'&admin_pin='+encodeURIComponent(pin())+'&reservation_id='+encodeURIComponent(ids.join(','));if(currentTab==='return')url+='&next_status=RETURNED';if(currentTab==='cancel')url+='&next_status=CANCELLED&note='+encodeURIComponent('Admin cancelled');if(currentTab==='refund'){const amount=prompt('Refund amount? 예: 20000 또는 15');if(!amount)throw new Error('refund_amount required');const method=prompt('Refund method? 예: PayPal / Bank / KakaoPay')||'';const note=prompt('Refund note?')||'';url+='&refund_amount='+encodeURIComponent(amount)+'&refund_method='+encodeURIComponent(method)+'&refund_note='+encodeURIComponent(note)}const data=await fetchJson(url);if(!data.ok)throw new Error(data.error||'Failed');setMsg('완료:\n'+ids.join('\n'),'ok');await loadUnpaid()}catch(e){setMsg(e.message||String(e),'err')}finally{setBusy(false);updateSelection()}}
async function createBundle(){setBusy(true);setMsg('Creating concert bundle...');try{const q=new URLSearchParams({mode:'admin_create_concert_bundle',admin_pin:pin(),concert_code:v('concertCode'),concert_title:v('concertTitle'),venue:v('venue'),start_date:v('startDate'),end_date:v('endDate'),time_lines:v('timeLines'),pickup_drop_guide_link:v('pickupLink'),next_day_pickup_guide_link:v('nextDayLink'),location_change_guide_link:v('changeLink')});const data=await fetchJson(API+'?'+q);if(!data.ok)throw new Error(data.error||'Failed');setMsg('Created: '+data.concert.concert_id+' / '+data.concert.concert_code+'\nDates: '+data.concert_dates.map(d=>d.concert_date+' '+d.concert_time+' · '+d.concert_date_id).join('\n'),'ok');await loadConcerts()}catch(e){setMsg(e.message||String(e),'err')}finally{setBusy(false)}}
async function loadConcerts(){setBusy(true);setMsg('Loading concerts...');try{const data=await fetchJson(API+'?mode=admin_concerts&admin_pin='+encodeURIComponent(pin()));if(!data.ok)throw new Error(data.error||'Failed');renderConcerts(data.concerts||[],data.concert_dates||[]);setMsg('Concerts loaded.','ok')}catch(e){setMsg(e.message||String(e),'err')}finally{setBusy(false)}}
function renderConcerts(concerts,dates){const el=document.getElementById('concertList');if(!concerts.length){el.innerHTML='<div class="ok">No concerts.</div>';return}el.innerHTML=concerts.map(c=>{const ds=dates.filter(d=>d.concert_id===c.concert_id);return `<div class="row" style="display:block"><div class="rid">${esc(c.concert_code)} · ${esc(c.concert_title)}</div><div class="meta">${esc(c.concert_id)} · ${esc(c.venue)} · active=${esc(c.is_active)}</div><details><summary class="small-btn">Edit Concert</summary><button class="small-btn secondary" type="button" onclick="modifyConcert('${esc(c.concert_id)}','${esc(c.concert_code)}','${esc(c.concert_title)}','${esc(c.venue)}')">Modify Concert</button><button class="small-btn secondary" type="button" onclick="setActive('concert','${esc(c.concert_id)}',${!isTrue(c.is_active)})">${isTrue(c.is_active)?'Disable':'Enable'} Concert</button><button class="small-btn secondary danger" type="button" onclick="deleteConcert('${esc(c.concert_id)}')">Delete Concert</button></details>${ds.map(d=>`<div class="meta" style="border-top:1px solid #d8d1c7;margin-top:10px;padding-top:8px">${esc(d.concert_date)} ${esc(d.concert_time)} · ${esc(d.concert_date_id)} · active=${esc(d.is_active)}<details><summary class="small-btn secondary">Edit Date</summary><button class="small-btn secondary" type="button" onclick="modifyDate('${esc(d.concert_date_id)}','${esc(d.concert_date)}','${esc(d.concert_time)}','${esc(d.pickup_drop_guide_link||'')}','${esc(d.next_day_pickup_guide_link||'')}','${esc(d.location_change_guide_link||'')}')">Modify Date / Guide Links</button><button class="small-btn secondary" type="button" onclick="setActive('concert_date','${esc(d.concert_date_id)}',${!isTrue(d.is_active)})">${isTrue(d.is_active)?'Disable':'Enable'} Date</button><button class="small-btn secondary danger" type="button" onclick="deleteDate('${esc(d.concert_date_id)}')">Delete Date</button></details></div>`).join('')}</div>`}).join('');document.getElementById('loadConcertsBtn').classList.add('hidden');document.getElementById('closeConcertsBtn').classList.remove('hidden')}
function isTrue(v){return v===true||String(v).toUpperCase()==='TRUE'}
async function setActive(kind,id,val){setBusy(true);setMsg('Updating active...');try{const q=new URLSearchParams({mode:'admin_set_active',admin_pin:pin(),kind,id,is_active:String(val).toUpperCase()});const data=await fetchJson(API+'?'+q);if(!data.ok)throw new Error(data.error||'Failed');await loadConcerts()}catch(e){setMsg(e.message||String(e),'err')}finally{setBusy(false)}}
async function modifyConcert(id,code,title,venue){const nextCode=prompt('concert_code',code)||code;const nextTitle=prompt('concert_title',title)||title;const nextVenue=prompt('venue',venue)||venue;setBusy(true);setMsg('Modifying concert...');try{const q=new URLSearchParams({mode:'admin_update_concert',admin_pin:pin(),concert_id:id,concert_code:nextCode,concert_title:nextTitle,venue:nextVenue});const data=await fetchJson(API+'?'+q);if(!data.ok)throw new Error(data.error||'Failed');await loadConcerts()}catch(e){setMsg(e.message||String(e),'err')}finally{setBusy(false)}}
async function modifyDate(id,date,time,pickup,nextDay,change){const nd=prompt('concert_date YYYY-MM-DD',date)||date;const nt=prompt('concert_time HH:MM',time)||time;const pl=prompt('pickup_drop_guide_link',pickup)||pickup;const nl=prompt('next_day_pickup_guide_link',nextDay)||nextDay;const cl=prompt('location_change_guide_link',change)||change;setBusy(true);setMsg('Modifying date...');try{const q=new URLSearchParams({mode:'admin_update_concert_date',admin_pin:pin(),concert_date_id:id,concert_date:nd,concert_time:nt,pickup_drop_guide_link:pl,next_day_pickup_guide_link:nl,location_change_guide_link:cl});const data=await fetchJson(API+'?'+q);if(!data.ok)throw new Error(data.error||'Failed');await loadConcerts()}catch(e){setMsg(e.message||String(e),'err')}finally{setBusy(false)}}
function closeConcerts(){document.getElementById('concertList').innerHTML='';document.getElementById('loadConcertsBtn').classList.remove('hidden');document.getElementById('closeConcertsBtn').classList.add('hidden');setMsg('Concert management closed.')}

async function deleteConcert(id){if(!confirm(id+' 삭제할까요? 예약이 있으면 삭제되지 않습니다.'))return;setBusy(true);setMsg('Deleting concert...');try{const q=new URLSearchParams({mode:'admin_delete_concert',admin_pin:pin(),concert_id:id});const data=await fetchJson(API+'?'+q);if(!data.ok)throw new Error(data.error||'Failed');setMsg('Deleted concert: '+id,'ok');await loadConcerts()}catch(e){setMsg(e.message||String(e),'err')}finally{setBusy(false)}}
async function deleteDate(id){if(!confirm(id+' 날짜를 삭제할까요? 예약이 있으면 삭제되지 않습니다.'))return;setBusy(true);setMsg('Deleting date...');try{const q=new URLSearchParams({mode:'admin_delete_concert_date',admin_pin:pin(),concert_date_id:id});const data=await fetchJson(API+'?'+q);if(!data.ok)throw new Error(data.error||'Failed');setMsg('Deleted date: '+id,'ok');await loadConcerts()}catch(e){setMsg(e.message||String(e),'err')}finally{setBusy(false)}}
function v(id){return document.getElementById(id).value.trim()}
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>setTab(b.dataset.tab)));loadBtn.addEventListener('click',loadUnpaid);selectAllBtn.addEventListener('click',selectAll);confirmBtn.addEventListener('click',confirmSelected);document.getElementById('createBundleBtn').addEventListener('click',createBundle);document.getElementById('loadConcertsBtn').addEventListener('click',loadConcerts);document.getElementById('closeConcertsBtn').addEventListener('click',closeConcerts);pinEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&currentTab!=='concert')loadUnpaid()});setTab('payment');
</script>
</body>
</html>
