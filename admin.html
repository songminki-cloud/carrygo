<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CarryGo Admin</title>
<link rel="stylesheet" href="css/tokens.css">
<style>
*{box-sizing:border-box}body{margin:0;background:var(--cg-warm-paper);color:var(--cg-ink);font-family:var(--font-sans);-webkit-font-smoothing:antialiased}.page{max-width:560px;margin:0 auto;padding:16px}.card{background:#fff;border:2px solid #111;border-radius:18px;padding:18px;margin-bottom:14px}h1{font-size:34px;line-height:.95;margin:0 0 10px;font-weight:900;letter-spacing:-.04em}p{font-size:14px;color:#555;line-height:1.45;margin:0 0 14px}.logo{width:176px;height:auto;margin-bottom:12px}.label{display:block;font-size:11px;font-weight:900;letter-spacing:.16em;text-transform:uppercase;color:#736f68;margin:12px 0 6px}input[type=password]{width:100%;border:1.4px solid #d8d1c7;border-radius:12px;padding:14px;font-size:18px;font-weight:800}button{width:100%;border:0;border-radius:999px;background:#050505;color:#fff;padding:15px 12px;font-size:15px;font-weight:900;margin-top:12px}button.secondary{background:#fff;color:#111;border:1.6px solid #111}button:disabled{opacity:.42}.row{border:1.4px solid #d8d1c7;border-radius:14px;padding:14px;margin-top:10px;background:#fff;display:grid;grid-template-columns:34px 1fr;gap:10px;align-items:start}.row input{width:24px;height:24px;margin-top:4px}.rid{font-size:23px;font-weight:900;letter-spacing:-.03em}.meta{font-size:13px;color:#555;line-height:1.45;margin-top:5px}.msg{font-size:13px;font-weight:800;margin-top:10px;color:#736f68;white-space:pre-wrap}.err{background:#fff3f0;border:1px solid #f1b8ac;border-radius:12px;color:#8f3c32;padding:12px}.ok{background:#ecfff7;border:1px solid #10b981;border-radius:12px;color:#065f46;padding:12px}.toolbar{position:sticky;bottom:0;background:var(--cg-warm-paper);padding:10px 0 4px;margin-top:10px}.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}.tab{border:1.3px solid #111;background:#fff;color:#111;padding:10px 6px;font-size:11px;margin:0}.tab.active{background:#111;color:#fff}.mini-form{display:grid;gap:10px;margin-top:12px}.mini-form input{width:100%;border:1.3px solid #d8d1c7;border-radius:10px;padding:11px;font-size:14px;font-weight:800}.hidden{display:none}.count{display:inline-block;background:#111;color:#fff;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:900;margin-left:6px}
</style>
</head>
<body>
<main class="page">
  <section class="card">
    <img class="logo" src="assets/logo/carrygo_logo_final.png" alt="CarryGo Seoul">
    <h1>CarryGo<br>Admin</h1>
    <p>결제확인, 수령완료, 취소, 환불, 콘서트/공연일 생성을 처리합니다.</p>
    <label class="label" for="pin">Admin PIN</label>
    <input id="pin" type="password" placeholder="PIN" autocomplete="current-password">
    <div class="tabs">
      <button class="tab active" type="button" data-tab="payment">Payment</button>
      <button class="tab" type="button" data-tab="return">Return</button>
      <button class="tab" type="button" data-tab="cancel">Cancel</button>
      <button class="tab" type="button" data-tab="refund">Refund</button>
      <button class="tab" type="button" data-tab="concert">Concert</button>
    </div>
    <button id="loadBtn" type="button">Load List</button>
    <button id="selectAllBtn" class="secondary hidden" type="button">Select All / 전체선택</button>
    <div id="msg" class="msg"></div>
  </section>
  <section id="concertTools" class="card hidden">
    <h1 style="font-size:24px">Create<br>Concert</h1>
    <div class="mini-form">
      <input id="concertId" placeholder="concert_id e.g. shinee_world_vii">
      <input id="concertCode" placeholder="concert_code e.g. SN">
      <input id="concertTitle" placeholder="concert_title">
      <input id="venue" placeholder="venue e.g. KSPO DOME">
      <button type="button" id="createConcertBtn">Create Concert</button>
    </div>
    <h1 style="font-size:24px;margin-top:20px">Create<br>Concert Date</h1>
    <div class="mini-form">
      <input id="dateId" placeholder="concert_date_id e.g. shinee_20260530">
      <input id="dateConcertId" placeholder="concert_id">
      <input id="concertDate" placeholder="concert_date YYYY-MM-DD">
      <input id="concertTime" placeholder="concert_time HH:MM">
      <input id="pickupLink" placeholder="pickup_drop_guide_link">
      <input id="nextDayLink" placeholder="next_day_pickup_guide_link">
      <input id="changeLink" placeholder="location_change_guide_link">
      <button type="button" id="createDateBtn">Create Concert Date</button>
    </div>
  </section>
  <section id="list"></section>
  <section class="toolbar hidden" id="toolbar">
    <button id="confirmBtn" type="button" disabled>Action Selected <span id="selectedCount" class="count">0</span></button>
  </section>
</main>
<script>
const API='https://script.google.com/macros/s/AKfycbyWazV2Bwyex0hyUG17615cCd4zFLnBOPABVv9wQ4AoVltXFrZ8Qh5ncPQtEW-c9ZFs/exec';
let currentTab='payment';
const pinEl=document.getElementById('pin'), msgEl=document.getElementById('msg'), listEl=document.getElementById('list'), toolbar=document.getElementById('toolbar'), confirmBtn=document.getElementById('confirmBtn'), selectedCount=document.getElementById('selectedCount'), selectAllBtn=document.getElementById('selectAllBtn'), loadBtn=document.getElementById('loadBtn'), concertTools=document.getElementById('concertTools');
function setMsg(text,type='msg'){msgEl.className=type;msgEl.textContent=text||''}function setBusy(b){[loadBtn,selectAllBtn,confirmBtn,document.getElementById('createConcertBtn'),document.getElementById('createDateBtn')].filter(Boolean).forEach(x=>x.disabled=b)}function pin(){return pinEl.value.trim()}function esc(v){return String(v||'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
async function fetchJson(url){const res=await fetch(url,{cache:'no-store'});const text=await res.text();try{return JSON.parse(text)}catch(e){throw new Error(text.slice(0,500))}}
function statusForTab(){return {payment:'UNPAID',return:'PICKED_UP',cancel:'UNPAID',refund:'CANCELLED'}[currentTab]||'UNPAID'}
function actionLabel(){return {payment:'Confirm Payment / 입금확인',return:'Mark Returned / 수령완료',cancel:'Cancel Selected / 취소처리',refund:'Save Refund / 환불기록'}[currentTab]||'Action'}
function modeForTab(){return {payment:'admin_confirm_payment',return:'admin_update_status',cancel:'admin_update_status',refund:'admin_refund'}[currentTab]}
function setTab(tab){currentTab=tab;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));listEl.innerHTML='';toolbar.classList.add('hidden');selectAllBtn.classList.add('hidden');concertTools.classList.toggle('hidden',tab!=='concert');loadBtn.classList.toggle('hidden',tab==='concert');confirmBtn.textContent=actionLabel()+' ';confirmBtn.appendChild(selectedCount);setMsg(tab==='concert'?'콘서트/공연일 생성 도구입니다.':'Load List를 눌러 목록을 불러오세요.');updateSelection()}
async function loadUnpaid(){const status=statusForTab();setMsg('Loading '+status+'...');setBusy(true);listEl.innerHTML='';toolbar.classList.add('hidden');selectAllBtn.classList.add('hidden');try{const url=currentTab==='payment'?API+'?mode=admin_list_unpaid&admin_pin='+encodeURIComponent(pin()):API+'?mode=admin_list&status='+encodeURIComponent(status)+'&admin_pin='+encodeURIComponent(pin());const data=await fetchJson(url);if(!data.ok)throw new Error(data.error||'Failed');renderRows(data.reservations||[]);setMsg(data.reservations&&data.reservations.length?`${data.reservations.length} ${status} reservation(s).`:`No ${status} reservations.`,'ok')}catch(e){setMsg(e.message||String(e),'err')}finally{setBusy(false);updateSelection()}}
function renderRows(rows){if(!rows.length){listEl.innerHTML='<div class="card ok">No reservations.</div>';return}listEl.innerHTML=rows.map(r=>`<label class="row"><input type="checkbox" class="pick" value="${esc(r.reservation_id)}"><div><div class="rid">${esc(r.reservation_id)}</div><div class="meta">${esc(r.customer_name)} · ${esc(r.customer_email)}<br>${esc(r.concert_date)} ${esc(r.concert_time)} · ${esc(r.payment_method||'')} · ${esc(r.amount_display||'')}<br>Status: ${esc(r.status||statusForTab())} ${r.picked_up_by?'· Staff: '+esc(r.picked_up_by):''}</div></div></label>`).join('');toolbar.classList.remove('hidden');selectAllBtn.classList.remove('hidden');document.querySelectorAll('.pick').forEach(cb=>cb.addEventListener('change',updateSelection))}
function selectedIds(){return Array.from(document.querySelectorAll('.pick:checked')).map(cb=>cb.value)}function updateSelection(){const n=selectedIds().length;selectedCount.textContent=n;confirmBtn.disabled=n===0}function selectAll(){document.querySelectorAll('.pick').forEach(cb=>cb.checked=true);updateSelection()}
async function confirmSelected(){const ids=selectedIds();if(!ids.length)return;if(!confirm(ids.join(', ')+' 처리할까요?'))return;setBusy(true);setMsg('Processing...\n'+ids.join('\n'));try{let url=API+'?mode='+modeForTab()+'&admin_pin='+encodeURIComponent(pin())+'&reservation_id='+encodeURIComponent(ids.join(','));if(currentTab==='return')url+='&next_status=RETURNED';if(currentTab==='cancel')url+='&next_status=CANCELLED&note='+encodeURIComponent('Admin cancelled');if(currentTab==='refund'){const amount=prompt('Refund amount? 예: 20000 또는 15');if(!amount)throw new Error('refund_amount required');const method=prompt('Refund method? 예: PayPal / Bank / KakaoPay')||'';const note=prompt('Refund note?')||'';url+='&refund_amount='+encodeURIComponent(amount)+'&refund_method='+encodeURIComponent(method)+'&refund_note='+encodeURIComponent(note)}const data=await fetchJson(url);if(!data.ok)throw new Error(data.error||'Failed');setMsg('완료:\n'+ids.join('\n'),'ok');await loadUnpaid()}catch(e){setMsg(e.message||String(e),'err')}finally{setBusy(false);updateSelection()}}
async function createConcert(){setBusy(true);setMsg('Creating concert...');try{const q=new URLSearchParams({mode:'admin_create_concert',admin_pin:pin(),concert_id:v('concertId'),concert_code:v('concertCode'),concert_title:v('concertTitle'),venue:v('venue')});const data=await fetchJson(API+'?'+q);if(!data.ok)throw new Error(data.error||'Failed');setMsg('Concert created: '+data.concert.concert_id,'ok')}catch(e){setMsg(e.message||String(e),'err')}finally{setBusy(false)}}
async function createDate(){setBusy(true);setMsg('Creating concert date...');try{const q=new URLSearchParams({mode:'admin_create_concert_date',admin_pin:pin(),concert_date_id:v('dateId'),concert_id:v('dateConcertId'),concert_date:v('concertDate'),concert_time:v('concertTime'),pickup_drop_guide_link:v('pickupLink'),next_day_pickup_guide_link:v('nextDayLink'),location_change_guide_link:v('changeLink')});const data=await fetchJson(API+'?'+q);if(!data.ok)throw new Error(data.error||'Failed');setMsg('Concert date created: '+data.concert_date.concert_date_id,'ok')}catch(e){setMsg(e.message||String(e),'err')}finally{setBusy(false)}}
function v(id){return document.getElementById(id).value.trim()}
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>setTab(b.dataset.tab)));loadBtn.addEventListener('click',loadUnpaid);selectAllBtn.addEventListener('click',selectAll);confirmBtn.addEventListener('click',confirmSelected);document.getElementById('createConcertBtn').addEventListener('click',createConcert);document.getElementById('createDateBtn').addEventListener('click',createDate);pinEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&currentTab!=='concert')loadUnpaid()});setTab('payment');
</script>
</body>
</html>
