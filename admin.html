<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CarryGo Admin</title>
<link rel="stylesheet" href="css/tokens.css">
<style>
*{box-sizing:border-box}body{margin:0;background:var(--cg-warm-paper);color:var(--cg-ink);font-family:var(--font-sans);-webkit-font-smoothing:antialiased}.page{max-width:560px;margin:0 auto;padding:16px}.card{background:#fff;border:2px solid #111;border-radius:18px;padding:18px;margin-bottom:14px}h1{font-size:34px;line-height:.95;margin:0 0 10px;font-weight:900;letter-spacing:-.04em}h2{font-size:24px;line-height:1;margin:0 0 12px;font-weight:900;letter-spacing:-.035em}p{font-size:14px;color:#555;line-height:1.45;margin:0 0 14px}.logo{width:176px;height:auto;margin-bottom:12px}.label{display:block;font-size:11px;font-weight:900;letter-spacing:.16em;text-transform:uppercase;color:#736f68;margin:12px 0 6px}.help{margin-top:6px;font-size:12px;line-height:1.4;color:#736f68;font-weight:800}input,textarea,select{width:100%;border:1.4px solid #d8d1c7;border-radius:12px;padding:13px;font-size:15px;font-weight:800;background:#fff;color:#111}input[type=password]{font-size:18px}textarea{min-height:96px;resize:vertical}button{width:100%;border:0;border-radius:999px;background:#050505;color:#fff;padding:15px 12px;font-size:15px;font-weight:900;margin-top:10px}button.secondary{background:#fff;color:#111;border:1.6px solid #111}button.danger{background:#fff;color:#8f3c32;border:1.6px solid #8f3c32}button:disabled{opacity:.42}.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:12px}.tab{border:1.3px solid #111;background:#fff;color:#111;padding:10px 4px;font-size:10px;margin:0}.tab.active{background:#111;color:#fff}.row{border:1.4px solid #d8d1c7;border-radius:14px;padding:14px;margin-top:10px;background:#fff}.row.pick-row{display:grid;grid-template-columns:34px 1fr;gap:10px;align-items:start}.row.pick-row input{width:24px;height:24px;margin-top:4px}.rid{font-size:23px;font-weight:900;letter-spacing:-.03em}.meta{font-size:13px;color:#555;line-height:1.45;margin-top:5px}.msg{font-size:13px;font-weight:800;margin-top:10px;color:#736f68;white-space:pre-wrap}.err{background:#fff3f0;border:1px solid #f1b8ac;border-radius:12px;color:#8f3c32;padding:12px}.ok{background:#ecfff7;border:1px solid #10b981;border-radius:12px;color:#065f46;padding:12px}.toolbar{position:sticky;bottom:0;background:var(--cg-warm-paper);padding:10px 0 4px;margin-top:10px}.hidden{display:none!important}.count{display:inline-block;background:#111;color:#fff;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:900;margin-left:6px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.actions.three{grid-template-columns:1fr 1fr 1fr}.date-item{border:1.3px solid #d8d1c7;border-radius:14px;padding:12px;margin-top:10px;background:#fff}.date-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.section-line{border-top:1.5px dashed #111;margin:16px 0}.small{font-size:12px;color:#736f68;font-weight:800}.concert-head{display:flex;justify-content:space-between;gap:10px;align-items:start}.pill{border:1px solid #111;border-radius:999px;padding:5px 8px;font-size:10px;font-weight:900}.pill.off{color:#8f3c32;border-color:#8f3c32}.form-title{display:flex;align-items:center;justify-content:space-between;gap:10px}.linkish{background:transparent!important;color:#111!important;border:0!important;text-decoration:underline;padding:6px!important;margin:0!important;width:auto!important}.footer-space{height:30px}
</style>
</head>
<body>
<main class="page">
  <section class="card">
    <img class="logo" src="assets/logo/carrygo_logo_final.png" alt="CarryGo Seoul">
    <h1>CarryGo<br>Admin</h1>
    <p>결제확인, 수령완료, 취소, 환불, 콘서트/공연일 관리를 처리합니다.</p>
    <label class="label" for="pin">Admin PIN</label>
    <input id="pin" type="password" placeholder="PIN" autocomplete="current-password">
    <div class="tabs">
      <button class="tab active" type="button" data-tab="payment">Payment</button>
      <button class="tab" type="button" data-tab="return">Return</button>
      <button class="tab" type="button" data-tab="cancel">Cancel</button>
      <button class="tab" type="button" data-tab="refund">Refund</button>
      <button class="tab" type="button" data-tab="concert">Concert</button>
    </div>
    <button id="loadBtn" type="button">Load Reservations</button>
    <button id="selectAllBtn" class="secondary hidden" type="button">Select all shown reservations</button>
    <div id="msg" class="msg"></div>
  </section>

  <section id="concertPanel" class="hidden">
    <section class="card">
      <div class="actions">
        <button id="newConcertBtn" type="button">Create Concert</button>
        <button id="loadConcertsBtn" class="secondary" type="button">Refresh Concerts</button>
      </div>
    </section>

    <section id="concertFormCard" class="card hidden">
      <div class="form-title">
        <h2 id="concertFormTitle">Create Concert</h2>
        <button id="closeFormBtn" class="linkish" type="button">Close</button>
      </div>
      <input id="editingConcertId" type="hidden">
      <label class="label" for="concertTitle">Concert Title</label>
      <input id="concertTitle" type="text" placeholder="SHINee WORLD VII">
      <label class="label" for="venue">Venue</label>
      <input id="venue" type="text" placeholder="KSPO DOME">
      <label class="label" for="city">City</label>
      <input id="city" type="text" placeholder="SEOUL">
      <label class="label" for="concertCode">Reservation Code (optional)</label>
      <input id="concertCode" type="text" placeholder="비우면 자동생성">
      <div class="help">예약번호 prefix로 쓰입니다. 비워두면 자동 생성됩니다.</div>
      <div id="newDateRange">
        <div class="date-grid">
          <div><label class="label" for="startDate">Start Date</label><input id="startDate" type="date"></div>
          <div><label class="label" for="endDate">End Date</label><input id="endDate" type="date"></div>
        </div>
        <button id="buildDatesBtn" class="secondary" type="button">Build Date Rows</button>
      </div>
      <div class="section-line"></div>
      <div class="small">공연일별 시간과 고객 안내 링크를 확인하세요. 빈 링크는 저장하지 않아도 됩니다.</div>
      <div id="dateRows"></div>
      <button id="addDateRowBtn" class="secondary" type="button">Add another show date</button>
      <button id="saveConcertBtn" type="button">Create concert</button>
      <div id="editOnlyActions" class="actions three hidden">
        <button id="disableConcertBtn" class="secondary" type="button">Close bookings</button>
        <button id="enableConcertBtn" class="secondary" type="button">Open bookings</button>
        <button id="deleteConcertBtn" class="danger" type="button">Delete concert</button>
      </div>
    </section>
    <section id="concertList"></section>
  </section>

  <section id="list"></section>
  <section class="toolbar hidden" id="toolbar">
    <button id="confirmBtn" type="button" disabled>Action Selected <span id="selectedCount" class="count">0</span></button>
  </section>
  <div class="footer-space"></div>
</main>
<script>
const API='https://script.google.com/macros/s/AKfycbyWazV2Bwyex0hyUG17615cCd4zFLnBOPABVv9wQ4AoVltXFrZ8Qh5ncPQtEW-c9ZFs/exec';
let currentTab='payment';
let concertsCache=[]; let datesCache=[];
const $=id=>document.getElementById(id);
const pinEl=$('pin'), msgEl=$('msg'), listEl=$('list'), toolbar=$('toolbar'), confirmBtn=$('confirmBtn'), selectedCount=$('selectedCount'), selectAllBtn=$('selectAllBtn'), loadBtn=$('loadBtn'), concertPanel=$('concertPanel'), concertList=$('concertList'), concertFormCard=$('concertFormCard'), dateRows=$('dateRows');
function pin(){return pinEl.value.trim()}function v(id){return $(id).value.trim()}function setVal(id,val){$(id).value=val||''}function esc(v){return String(v||'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}function setMsg(text,type='msg'){msgEl.className=type;msgEl.textContent=text||''}function setBusy(b){document.querySelectorAll('button').forEach(x=>x.disabled=b)}async function fetchJson(url){const res=await fetch(url,{cache:'no-store'});const text=await res.text();try{return JSON.parse(text)}catch(e){throw new Error(text.slice(0,500))}}
function statusForTab(){return {payment:'UNPAID',return:'PICKED_UP',cancel:'UNPAID',refund:'CANCELLED'}[currentTab]||'UNPAID'}function actionLabel(){return {payment:'Confirm payment / 입금확인',return:'Mark as returned / 수령완료',cancel:'Cancel reservation / 취소처리',refund:'Record refund / 환불기록'}[currentTab]||'Action'}function modeForTab(){return {payment:'admin_confirm_payment',return:'admin_update_status',cancel:'admin_update_status',refund:'admin_refund'}[currentTab]}
function setTab(tab){currentTab=tab;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));listEl.innerHTML='';concertList.innerHTML='';toolbar.classList.add('hidden');selectAllBtn.classList.add('hidden');concertPanel.classList.toggle('hidden',tab!=='concert');loadBtn.classList.toggle('hidden',tab==='concert');confirmBtn.textContent=actionLabel()+' ';confirmBtn.appendChild(selectedCount);setMsg(tab==='concert'?'Create Concert 또는 Refresh Concerts를 선택하세요.':'Load Reservations를 눌러 현재 처리할 예약을 불러오세요.');updateSelection()}
async function loadList(){const status=statusForTab();setMsg('Loading reservations: '+status+'...');setBusy(true);listEl.innerHTML='';toolbar.classList.add('hidden');selectAllBtn.classList.add('hidden');try{const url=currentTab==='payment'?API+'?mode=admin_list_unpaid&admin_pin='+encodeURIComponent(pin()):API+'?mode=admin_list&status='+encodeURIComponent(status)+'&admin_pin='+encodeURIComponent(pin());const data=await fetchJson(url);if(!data.ok)throw new Error(data.error||'Failed');renderRows(data.reservations||[]);setMsg(data.reservations&&data.reservations.length?`${data.reservations.length} reservation(s) ready for ${actionLabel()}.`:`No reservations need this action right now.`,'ok')}catch(e){setMsg(e.message||String(e),'err')}finally{setBusy(false);updateSelection()}}
function renderRows(rows){if(!rows.length){listEl.innerHTML='<div class="card ok">No reservations need this action.</div>';return}listEl.innerHTML=rows.map(r=>`<label class="row pick-row"><input type="checkbox" class="pick" value="${esc(r.reservation_id)}"><div><div class="rid">${esc(r.reservation_id)}</div><div class="meta">${esc(r.customer_name)} · ${esc(r.customer_email)}<br>${esc(r.concert_date)} ${esc(r.concert_time)} · 맡기는 시간 ${esc(r.pickup_time||'-')}<br>캐리어 ${esc(r.expected_suitcase_count||'-')} · 추가짐 ${esc(r.expected_extra_bag_count||'0')}<br>${esc(r.payment_method||'')} · ${esc(r.amount_display||'')}<br>Status: ${esc(r.status||statusForTab())} ${r.picked_up_by?'· Staff: '+esc(r.picked_up_by):''}</div></div></label>`).join('');toolbar.classList.remove('hidden');selectAllBtn.classList.remove('hidden');document.querySelectorAll('.pick').forEach(cb=>cb.addEventListener('change',updateSelection))}
function selectedIds(){return Array.from(document.querySelectorAll('.pick:checked')).map(cb=>cb.value)}function updateSelection(){const n=selectedIds().length;selectedCount.textContent=n;confirmBtn.disabled=n===0}function selectAll(){document.querySelectorAll('.pick').forEach(cb=>cb.checked=true);updateSelection()}
async function confirmSelected(){const ids=selectedIds();if(!ids.length)return;if(!confirm(actionLabel()+' for '+ids.length+' reservation(s)?\n\n'+ids.join('\n')))return;setBusy(true);setMsg('Processing...\n'+ids.join('\n'));try{let url=API+'?mode='+modeForTab()+'&admin_pin='+encodeURIComponent(pin())+'&reservation_id='+encodeURIComponent(ids.join(','));if(currentTab==='return')url+='&next_status=RETURNED';if(currentTab==='cancel')url+='&next_status=CANCELLED&note='+encodeURIComponent('Admin cancelled');if(currentTab==='refund'){const amount=prompt('Refund amount? 예: 20000 또는 15');if(!amount)throw new Error('Refund amount is required.');const method=prompt('Refund method? 예: PayPal / Bank / KakaoPay')||'';const note=prompt('Refund note?')||'';url+='&refund_amount='+encodeURIComponent(amount)+'&refund_method='+encodeURIComponent(method)+'&refund_note='+encodeURIComponent(note)}const data=await fetchJson(url);if(!data.ok)throw new Error(data.error||'Failed');setMsg('Completed:\n'+ids.join('\n'),'ok');await loadList()}catch(e){setMsg(e.message||String(e),'err')}finally{setBusy(false);updateSelection()}}
function clearConcertForm(){setVal('editingConcertId','');setVal('concertTitle','');setVal('venue','');setVal('city','SEOUL');setVal('concertCode','');setVal('startDate','');setVal('endDate','');dateRows.innerHTML='';$('concertFormTitle').textContent='Create Concert';$('saveConcertBtn').textContent='Create concert';$('newDateRange').classList.remove('hidden');$('editOnlyActions').classList.add('hidden');concertFormCard.classList.remove('hidden')}
function closeConcertForm(){concertFormCard.classList.add('hidden')}
function makeDateRow(d={}){const div=document.createElement('div');div.className='date-item';div.dataset.id=d.concert_date_id||'';div.innerHTML=`<div class="date-grid"><div><label class="label">Show date</label><input class="date-date" type="date" value="${esc(d.concert_date||'')}"></div><div><label class="label">Start time</label><input class="date-time" type="time" value="${esc(d.concert_time||'')}"></div></div><label class="label">Drop-off time options</label><input class="date-times" type="text" placeholder="10:00,12:00,14:00" value="${esc(d.pickup_time_options||'10:00,12:00,14:00')}"><label class="label">Pickup & drop guide link</label><input class="date-pickup" type="url" placeholder="https://..." value="${esc(d.pickup_drop_guide_link||'')}"><label class="label">Next-day pickup guide link</label><input class="date-next" type="url" placeholder="https://..." value="${esc(d.next_day_pickup_guide_link||'')}"><label class="label">Location change guide link</label><input class="date-change" type="url" placeholder="https://..." value="${esc(d.location_change_guide_link||'')}"><button class="secondary" type="button">Delete this show date</button>`;div.querySelector('button').addEventListener('click',()=>removeDateRow(div));dateRows.appendChild(div)}
async function removeDateRow(div){const id=div.dataset.id;if(!id){div.remove();return}if(!confirm('Delete this show date?\n\n'+id+'\n예약이 있으면 삭제되지 않습니다.'))return;setBusy(true);setMsg('Deleting show date...');try{const q=new URLSearchParams({mode:'admin_delete_concert_date',admin_pin:pin(),concert_date_id:id});const data=await fetchJson(API+'?'+q);if(!data.ok)throw new Error(data.error||'Failed');div.remove();datesCache=datesCache.filter(d=>d.concert_date_id!==id);setMsg('Deleted show date: '+id,'ok')}catch(e){setMsg(e.message||String(e),'err')}finally{setBusy(false)}}
function buildDateRows(){dateRows.innerHTML='';const start=v('startDate'),end=v('endDate');if(!start||!end){setMsg('기간을 먼저 입력하세요.', 'err');return}const sd=new Date(start+'T00:00:00'),ed=new Date(end+'T00:00:00');if(ed<sd){setMsg('종료일은 시작일 이후여야 합니다.','err');return}for(let d=new Date(sd);d<=ed;d.setDate(d.getDate()+1)){makeDateRow({concert_date:d.toISOString().slice(0,10)})}}
async function loadConcerts(){setBusy(true);setMsg('Loading concerts and show dates...');try{const data=await fetchJson(API+'?mode=admin_concerts&admin_pin='+encodeURIComponent(pin()));if(!data.ok)throw new Error(data.error||'Failed');concertsCache=data.concerts||[];datesCache=data.concert_dates||[];renderConcertList();setMsg('Concerts loaded. Select Edit to manage bookings, dates, and guide links.','ok')}catch(e){setMsg(e.message||String(e),'err')}finally{setBusy(false)}}
function isTrue(v){return v===true||String(v).toUpperCase()==='TRUE'}
function renderConcertList(){if(!concertsCache.length){concertList.innerHTML='<div class="card ok">No concerts yet.</div>';return}concertList.innerHTML=concertsCache.map(c=>{const ds=datesCache.filter(d=>d.concert_id===c.concert_id);return `<div class="row"><div class="concert-head"><div><div class="rid">${esc(c.concert_code)} · ${esc(c.concert_title)}</div><div class="meta">${esc(c.venue)} · ${esc(c.city||'SEOUL')} · ${ds.length} show date(s)<br>ID: ${esc(c.concert_id)}</div></div><span class="pill ${isTrue(c.is_active)?'':'off'}">${isTrue(c.is_active)?'OPEN':'CLOSED'}</span></div><button class="secondary" type="button" data-edit="${esc(c.concert_id)}">Edit concert</button></div>`}).join('');concertList.querySelectorAll('[data-edit]').forEach(btn=>btn.addEventListener('click',()=>editConcert(btn.dataset.edit)))}
function editConcert(concertId){const c=concertsCache.find(x=>x.concert_id===concertId);if(!c)return;setVal('editingConcertId',c.concert_id);setVal('concertTitle',c.concert_title);setVal('venue',c.venue);setVal('city',c.city||'SEOUL');setVal('concertCode',c.concert_code);$('concertFormTitle').textContent='Edit Concert';$('saveConcertBtn').textContent='Save changes';$('newDateRange').classList.add('hidden');$('editOnlyActions').classList.remove('hidden');$('disableConcertBtn').textContent='Close bookings';$('enableConcertBtn').textContent='Open bookings';dateRows.innerHTML='';datesCache.filter(d=>d.concert_id===concertId).forEach(makeDateRow);concertFormCard.classList.remove('hidden');concertFormCard.scrollIntoView({behavior:'smooth',block:'start'})}
function collectDateRows(){return Array.from(dateRows.querySelectorAll('.date-item')).map(el=>({id:el.dataset.id,date:el.querySelector('.date-date').value,time:el.querySelector('.date-time').value,times:el.querySelector('.date-times').value,pickup:el.querySelector('.date-pickup').value,next:el.querySelector('.date-next').value,change:el.querySelector('.date-change').value})).filter(d=>d.date&&d.time)}
async function saveConcert(){setBusy(true);setMsg('Saving concert...');try{const editing=v('editingConcertId');const rows=collectDateRows();if(!v('concertTitle')||!v('venue'))throw new Error('콘서트명과 장소는 필수입니다.');if(!rows.length)throw new Error('공연일/시간은 최소 1개 필요합니다.');if(!editing){const dateLines=rows.map(r=>r.date+' '+r.time).join('\n');const q=new URLSearchParams({mode:'admin_create_concert_bundle',admin_pin:pin(),concert_code:v('concertCode'),concert_title:v('concertTitle'),venue:v('venue'),city:v('city'),date_lines:dateLines,pickup_time_options:rows[0].times||'10:00,12:00,14:00',pickup_drop_guide_link:rows[0].pickup||'',next_day_pickup_guide_link:rows[0].next||'',location_change_guide_link:rows[0].change||''});let data=await fetchJson(API+'?'+q);if(!data.ok)throw new Error(data.error||'Failed');for(let i=0;i<rows.length;i++){const created=data.concert_dates&&data.concert_dates[i];if(!created)continue;const r=rows[i];const uq=new URLSearchParams({mode:'admin_update_concert_date',admin_pin:pin(),concert_date_id:created.concert_date_id,concert_date:r.date,concert_time:r.time,pickup_time_options:r.times,pickup_drop_guide_link:r.pickup,next_day_pickup_guide_link:r.next,location_change_guide_link:r.change});const updated=await fetchJson(API+'?'+uq);if(!updated.ok)throw new Error(updated.error||'Failed')}setMsg('Created concert: '+data.concert.concert_id,'ok')}else{let q=new URLSearchParams({mode:'admin_update_concert',admin_pin:pin(),concert_id:editing,concert_code:v('concertCode'),concert_title:v('concertTitle'),venue:v('venue'),city:v('city')});let data=await fetchJson(API+'?'+q);if(!data.ok)throw new Error(data.error||'Failed');for(const r of rows){if(r.id){q=new URLSearchParams({mode:'admin_update_concert_date',admin_pin:pin(),concert_date_id:r.id,concert_date:r.date,concert_time:r.time,pickup_time_options:r.times,pickup_drop_guide_link:r.pickup,next_day_pickup_guide_link:r.next,location_change_guide_link:r.change});data=await fetchJson(API+'?'+q);if(!data.ok)throw new Error(data.error||'Failed')}else{q=new URLSearchParams({mode:'admin_create_concert_date',admin_pin:pin(),concert_id:editing,concert_date:r.date,concert_time:r.time,pickup_time_options:r.times,pickup_drop_guide_link:r.pickup,next_day_pickup_guide_link:r.next,location_change_guide_link:r.change});data=await fetchJson(API+'?'+q);if(!data.ok)throw new Error(data.error||'Failed')}}setMsg('Saved changes: '+editing,'ok')}await loadConcerts()}catch(e){setMsg(e.message||String(e),'err')}finally{setBusy(false)}}
async function setConcertActive(val){const id=v('editingConcertId');if(!id)return;if(!confirm((val?'Open bookings for ':'Close bookings for ')+id+'?'))return;setBusy(true);setMsg(val?'Opening bookings...':'Closing bookings...');try{const q=new URLSearchParams({mode:'admin_set_active',admin_pin:pin(),kind:'concert',id,is_active:String(val).toUpperCase()});const data=await fetchJson(API+'?'+q);if(!data.ok)throw new Error(data.error||'Failed');setMsg((val?'Bookings opened: ':'Bookings closed: ')+id,'ok');await loadConcerts()}catch(e){setMsg(e.message||String(e),'err')}finally{setBusy(false)}}
async function deleteConcert(){const id=v('editingConcertId');if(!id)return;if(!confirm('Delete this concert?\n\n'+id+'\n예약이 있으면 삭제되지 않습니다. 삭제 대신 예약만 닫으려면 Close bookings를 사용하세요.'))return;setBusy(true);setMsg('Deleting concert...');try{const q=new URLSearchParams({mode:'admin_delete_concert',admin_pin:pin(),concert_id:id});const data=await fetchJson(API+'?'+q);if(!data.ok)throw new Error(data.error||'Failed');setMsg('Deleted concert: '+id,'ok');closeConcertForm();await loadConcerts()}catch(e){setMsg(e.message||String(e),'err')}finally{setBusy(false)}}
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>setTab(b.dataset.tab)));loadBtn.addEventListener('click',loadList);selectAllBtn.addEventListener('click',selectAll);confirmBtn.addEventListener('click',confirmSelected);$('newConcertBtn').addEventListener('click',clearConcertForm);$('loadConcertsBtn').addEventListener('click',loadConcerts);$('closeFormBtn').addEventListener('click',closeConcertForm);$('buildDatesBtn').addEventListener('click',buildDateRows);$('addDateRowBtn').addEventListener('click',()=>makeDateRow());$('saveConcertBtn').addEventListener('click',saveConcert);$('disableConcertBtn').addEventListener('click',()=>setConcertActive(false));$('enableConcertBtn').addEventListener('click',()=>setConcertActive(true));$('deleteConcertBtn').addEventListener('click',deleteConcert);pinEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&currentTab!=='concert')loadList()});setTab('payment');
</script>
</body>
</html>
